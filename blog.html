<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Alex Rhodes</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111110;
      --surface: #1a1916;
      --text: #e8e5de;
      --muted: #6b6860;
      --border: #262420;
      --hover-bg: #1e1d1a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 620px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ── HEADER ── */
    header {
      padding: 52px 0 48px;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }

    .header-left { flex: 1; min-width: 0; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 20px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }
    .back-link svg { width: 12px; height: 12px; }

    .page-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(32px, 6vw, 46px);
      font-weight: 400;
      letter-spacing: -0.3px;
      line-height: 1.05;
      margin-bottom: 14px;
      color: var(--text);
      opacity: 0;
      animation: up 0.55s ease 0.05s forwards;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.75;
      opacity: 0;
      animation: up 0.55s ease 0.15s forwards;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FILTER TABS ── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 28px 0 0;
    }

    .filter-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      color: var(--text);
      border-color: var(--muted);
    }
    .filter-btn.active {
      background: var(--surface);
    }

    /* ── POSTS ── */
    section {
      padding: 40px 0 52px;
    }

    .posts-empty {
      padding: 48px 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .post-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 20px 10px;
      margin: 0 -10px;
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      border-radius: 4px;
      transition: background 0.12s;
    }
    .post-row:last-child { border-bottom: 1px solid var(--border); }
    .post-row:hover { background: var(--hover-bg); }

    .post-info { flex: 1; min-width: 0; }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .post-date {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      white-space: nowrap;
    }

    .post-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 2px 9px;
    }

    .post-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 19px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 5px;
    }

    .post-excerpt {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .post-arrow {
      font-size: 14px;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 2px;
      transition: transform 0.15s, color 0.15s;
    }
    .post-row:hover .post-arrow {
      color: var(--text);
      transform: translate(2px, -2px);
    }

    /* ── FOOTER ── */
    footer {
      padding: 36px 0 60px;
      border-top: 1px solid var(--border);
    }
    footer .wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p { font-size: 12px; color: var(--muted); }
    footer a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      header { padding: 40px 0 36px; }
      .post-row { padding: 16px 8px; margin: 0 -8px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap">
      <div class="header-inner">
        <div class="header-left">
          <a href="/" class="back-link">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M7.5 2L3.5 6l4 4"/>
            </svg>
            Alex Rhodes
          </a>
          <h1 class="page-title">Writing</h1>
          <p class="page-subtitle">Thoughts on building, selling, training, and everything in between.</p>
        </div>
      </div>

      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="building">Building</button>
        <button class="filter-btn" data-filter="sales">Sales & GTM</button>
        <button class="filter-btn" data-filter="training">Training</button>
        <button class="filter-btn" data-filter="life">Life</button>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div class="wrap">

        <!-- ─────────────────────────────────────────────────────────────────
             POSTS — add new entries here, newest first.
             Copy a <a class="post-row"> block and update:
               - href         → path to the post file
               - data-tags    → one of: building | sales | training | life
               - .post-date   → formatted date (e.g. "Mar 2026")
               - .post-tag    → display label for the tag
               - .post-title  → the post title
               - .post-excerpt → one-sentence summary
        ──────────────────────────────────────────────────────────────────── -->

        <!-- newest first -->

        <a href="/blog/three-months-in-b2b-gtm.html" class="post-row" data-tags="sales">
          <div class="post-info">
            <div class="post-meta">
              <span class="post-date">Mar 2026</span>
              <span class="post-tag">Sales &amp; GTM</span>
            </div>
            <div class="post-title">3 Months Is a Long Time in B2B GTM</div>
            <div class="post-excerpt">The SaaS landscape has shifted — but the shift isn't about the AI layer. It's about the data layer underneath it.</div>
          </div>
          <span class="post-arrow">↗</span>
        </a>

        <!--
        ADD NEW POSTS ABOVE THIS LINE.
        Copy the <a class="post-row"> block, update href / data-tags / date / tag / title / excerpt.
        data-tags options: building | sales | training | life
        -->

      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <p>&copy; 2026 Alex Rhodes</p>
      <a href="/">← Home</a>
    </div>
  </footer>

  <script>
    // Filter posts by tag
    const filterBtns = document.querySelectorAll('.filter-btn');
    const postRows   = document.querySelectorAll('.post-row');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;

        postRows.forEach(row => {
          const tags = (row.dataset.tags || '').split(' ');
          row.style.display = (filter === 'all' || tags.includes(filter)) ? '' : 'none';
        });

        // Show empty state if nothing visible
        const visible = [...postRows].filter(r => r.style.display !== 'none');
        const empty = document.querySelector('.posts-empty');
        if (empty) empty.style.display = visible.length === 0 ? '' : 'none';
      });
    });
  </script>

</body>
</html>
